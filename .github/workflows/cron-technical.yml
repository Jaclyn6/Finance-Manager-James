# Phase 2 Step 7 — Daily Technical & Prices cron (BATCH 1).
#
# Triggers the Vercel-hosted `/api/cron/ingest-technical?batch=1`
# endpoint, which fetches Alpha Vantage daily bars for the FIRST 10 of
# 19 tickers (blueprint §3.2; see C2 split in
# `ingest-technical/ticker-registry.ts`) and writes to BOTH
# `technical_readings` and `price_readings` (shared-fetch design — see
# route.ts docstring). Then triggers `/api/cron/ingest-prices` for the
# 3 CoinGecko crypto IDs (CoinGecko quota is independent of Alpha
# Vantage, so the two routes don't share a budget).
#
# The remaining 9 tickers run as batch 2 in `cron-technical-batch2.yml`
# 30 minutes later — see that file for split rationale. Prices only
# runs in batch 1 (3 coins, ~3s, no AV quota); batch 2 skips it.
#
# Schedule: `0 22 * * *` UTC = 1 hour after US market close (21:00 UTC)
# so Alpha Vantage's daily bars are settled before we pull. Blueprint
# §3.3 row for the daily workflow mandates this window.
#
# Secrets required on the GitHub repo (Settings → Secrets → Actions):
#   - CRON_SECRET:    same value as the Vercel env var. Sync manually
#                     (plan §0.2 #8 — no OIDC federation at Phase 2).
#   - PRODUCTION_URL: base URL of the Vercel production deployment.
#                     Expected value today:
#                       https://finance-manager-james.vercel.app
#                     Documented here so a new maintainer sees the
#                     source-of-truth without digging through handoff.md.
#                     ADD THIS SECRET BEFORE ENABLING THE WORKFLOW —
#                     otherwise the curl invocation resolves to
#                     `https:///api/cron/...` and fails loudly (good).
#
# curl flags rationale:
#   -s    : silent (no progress bar in Actions log)
#   -S    : but do show errors
#   -f    : fail the step on non-2xx HTTP (surfaces a Vercel 500 or a
#           401 misauth to the Actions run without us grep'ing the body)
#   -H    : Bearer token header — verified server-side by
#           `verifyCronSecret` in `src/lib/auth/cron-secret.ts`

name: Technical Cron (batch 1)

on:
  schedule:
    # 22:00 UTC = 07:00 KST next day. US market closed ~1h earlier.
    - cron: "0 22 * * *"
  # Manual-dispatch button in the Actions UI for Step 7 acceptance
  # testing (blueprint §9 Step 7 acceptance: "A single GHA workflow
  # manual-dispatch from the Actions UI succeeds end-to-end on a
  # preview deployment").
  workflow_dispatch:

# Make concurrency explicit: never overlap two runs of this workflow,
# and cancel any in-flight run when a newer one starts. A race would
# have both runs hitting Alpha Vantage's 5/min ceiling simultaneously
# and tripping the rate-limit payload detector.
#
# Batch 2 uses a separate concurrency group (`cron-technical-batch2`)
# so the two batches can run in series 30 minutes apart without one
# cancelling the other.
concurrency:
  group: cron-technical-batch1
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    # Route's own maxDuration is 300s; add headroom for curl connect +
    # the CoinGecko leg. 10 minutes is plenty and bounds a hung request.
    timeout-minutes: 10
    steps:
      # Lesson from cron-hourly: passing `${{ secrets.XXX }}` inline in
      # the curl args got the value masked weirdly under some shells.
      # Hoisting them into `env:` first makes the masking deterministic
      # and the curl line readable.
      - name: Trigger /api/cron/ingest-technical?batch=1
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          curl -sSf \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${PRODUCTION_URL}/api/cron/ingest-technical?batch=1"

      # Prices cron runs right after technical batch 1. CoinGecko
      # budget is independent of Alpha Vantage so there's no spacing
      # concern; sequential-not-parallel keeps the Supabase write graph
      # simple (one writer at a time against `price_readings`).
      #
      # Prices runs ONLY in batch 1, not batch 2 — 3 coins finish in
      # ~3s and the daily snapshot only needs to land once.
      - name: Trigger /api/cron/ingest-prices
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          curl -sSf \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${PRODUCTION_URL}/api/cron/ingest-prices"
